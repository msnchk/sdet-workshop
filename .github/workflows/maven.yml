name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - ui-testing-v1
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start Selenium Grid with Docker Compose
        run: |
          docker-compose up -d
          sleep 15 

      - name: Check Selenium status
        run: curl -sSf http://selenium-hub:4444/wd/hub/status | jq .value.ready

      - name: Run tests with Maven
        run: mvn clean test
        env:
          SELENIUM_URL: "http://selenium-hub:4444/wd/hub"
          ALLURE_RESULTS_DIRECTORY: "target/allure-results"

      - name: Install Allure CLI
        run: sudo apt-get update && sudo apt-get install -y allure

      - name: Generate Allure Report
        run: |
          allure generate target/allure-results -o target/allure-report --single-file --clean

      - name: Upload Allure HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: target/allure-report

      - name: Upload Raw Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Stop Selenium Grid
        if: always()
        run: docker-compose down